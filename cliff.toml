[changelog]

header = "# Changelog\n\nВсе существенные изменения в этом проекте будут записаны в этом файле.\n\n"

footer = "<!-- сгенерировано с помощью git-cliff -->"

[git]

commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Новые функции" },
    { message = "^fix", group = "<!-- 1 -->Исправления ошибок" },
    { message = "^build", group = "<!-- 2 -->Сборка и зависимости" },
    { message = "^docs", group = "<!-- 4 -->Документация" },
    { message = "^perf", group = "<!-- 5 -->Улучшение производительности" },
    { message = "^refactor", group = "<!-- 3 -->Рефакторинг" },
    { message = "^style", group = "<!-- 6 -->Форматирование кода" },
    { message = "^test", group = "<!-- 7 -->Тестирование" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore", group = "<!-- 8 -->Рутина" },
    { message = "^ci", group = "<!-- 9 -->CI/CD" },
    { body = ".*security", group = "<!-- 10 -->Безопасность" },
    { message = "^revert", group = "<!-- 11 -->Откат изменений" },
    { message = ".*", group = "<!-- 12 -->Прочее" },
]

filter_unconventional = true